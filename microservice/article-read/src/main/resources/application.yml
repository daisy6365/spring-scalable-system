server:
  port: 9005
spring:
  application:
    name: spring-scalable-system-article-read-service
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: spring-scalable-system-article-read-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
endpoints:
  spring-scalable-system-article-service:
    url: http://127.0.0.1:9000
  spring-scalable-system-comment-service:
    url: http://127.0.0.1:9001
  spring-scalable-system-like-service:
    url: http://127.0.0.1:9002
  spring-scalable-system-view-service:
    url: http://127.0.0.1:9003